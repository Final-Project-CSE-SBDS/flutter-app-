name: ecg_monitor
description: ECG Arrhythmia Classification App with Mamba AI Model

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # TFLite for ML inference
  tflite_flutter: ^0.11.0
  
  # Bluetooth for wearable integration
  flutter_blue_plus: ^1.31.0
  
  # Charts for ECG visualization
  fl_chart: ^0.68.0
  
  # CSV parsing
  csv: ^5.1.1
  
  # Date formatting
  intl: ^0.19.0
  
  # Notifications for smartwatch
  flutter_local_notifications: 14.1.0
  
  # Material design
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  # Asset configuration
  assets:
    - assets/mamba_ecg.tflite
    - assets/sample_ecg.csv
